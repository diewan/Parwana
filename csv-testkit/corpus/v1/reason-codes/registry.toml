# Published reason-code registry (Master Plan §37).
#
# csv_accountability_verify::ReasonCode is the source of truth; each variant maps to a
# stable namespaced identifier via ReasonCode::registry_id(). This table is the published
# projection. The affirmative and reserved-anchor codes are also published so the
# namespaces are owned before Phase B emits them.

