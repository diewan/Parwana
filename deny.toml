# deny.toml — Architectural Constitution
# Every entry here is a compile-time constraint.
# Violations fail CI with a precise error message.

[graph]
targets = []

[[graph.forbidden-edges]]
# csv-runtime is an orchestration facade only.
# It may NOT reach into protocol internals.
from = "csv-runtime"
to   = "csv-protocol"
path = "csv-protocol::internal"
message = "csv-runtime must import ONLY public protocol types. Direct internal access is forbidden."

[[graph.forbidden-edges]]
# Adapters must never depend on runtime.
# Adapters are leaf nodes. They receive runtime handles; they do not construct them.
from = "csv-adapters/*"
to   = "csv-runtime"
message = "Adapters are leaf nodes. They may not depend on csv-runtime."

[[graph.forbidden-edges]]
# Verifier must not depend on chain adapters.
# Verification is chain-agnostic. If this edge exists, the verifier is contaminated.
from = "csv-verifier"
to   = "csv-adapters/*"
message = "csv-verifier must be chain-agnostic. Adapter imports are forbidden."

[[graph.forbidden-edges]]
# Pure algebra layer must have zero infrastructure dependencies.
from = "csv-algebra"
to   = "serde"
message = "csv-algebra is no_std + no-serde. Use csv-wire for serialization."

[[graph.forbidden-edges]]
from = "csv-algebra"
to   = "tokio"
message = "csv-algebra is synchronous and allocation-minimal. No async runtimes."

[[graph.forbidden-edges]]
from = "csv-algebra"
to   = "reqwest"
message = "csv-algebra has zero network dependencies."

[[graph.forbidden-edges]]
# L0-L4 internal crates must not use serde_json for wire encoding.
# csv-wire owns all transport encoding. Use csv-wire wire types instead.
from = "csv-hash"
to   = "serde_json"
message = "csv-hash must not use serde_json. Use csv-wire for transport encoding."

[[graph.forbidden-edges]]
from = "csv-protocol"
to   = "serde_json"
message = "csv-protocol must not use serde_json. Use csv-wire for transport encoding."

[[graph.forbidden-edges]]
from = "csv-proof"
to   = "serde_json"
message = "csv-proof must not use serde_json. Use csv-wire for transport encoding."

[[graph.forbidden-edges]]
from = "csv-verifier"
to   = "serde_json"
message = "csv-verifier must not use serde_json. Use csv-wire for transport encoding."

[[graph.forbidden-edges]]
from = "csv-schema"
to   = "serde_json"
message = "csv-schema must not use serde_json. Use csv-wire for transport encoding."

[[graph.forbidden-edges]]
from = "csv-content"
to   = "serde_json"
message = "csv-content must not use serde_json. Use csv-wire for transport encoding."

[[graph.forbidden-edges]]
# L0-L4 internal crates must not use serde directly for wire encoding.
# csv-wire owns all serde and transport encoding.
# Exception: serde derives are allowed for canonical serialization via csv-codec::canonical.
# L0/L1 types MUST use canonical_cbor for serialization (not serde_json).
# L2+ types MAY use serde for configuration/indexing/persistence.
from = "csv-hash"
to   = "serde_json"
message = "csv-hash (L0) must not use serde_json. Use canonical_cbor via csv-codec for deterministic encoding."

[[graph.forbidden-edges]]
from = "csv-protocol"
to   = "serde_json"
message = "csv-protocol (L0/L1) must not use serde_json. Use canonical_cbor via csv-codec for deterministic encoding. L2+ types MAY use serde for non-critical paths."

[[graph.forbidden-edges]]
from = "csv-proof"
to   = "serde_json"
message = "csv-proof (L0/L1) must not use serde_json. Use canonical_cbor via csv-codec for deterministic encoding. L2+ types MAY use serde for non-critical paths."

[[graph.forbidden-edges]]
from = "csv-verifier"
to   = "serde_json"
message = "csv-verifier (L0/L1) must not use serde_json. Use canonical_cbor via csv-codec for deterministic encoding."

[[graph.forbidden-edges]]
# csv-runtime must not depend on csv-core (legacy crate)
from = "csv-runtime"
to   = "csv-core"
message = "csv-runtime must not depend on csv-core. Use csv-protocol/csv-verifier/csv-storage instead."

[[graph.forbidden-edges]]
# csv-sdk must not depend on csv-core (legacy crate)
from = "csv-sdk"
to   = "csv-core"
message = "csv-sdk must not depend on csv-core. Use csv-protocol/csv-verifier/csv-storage instead."

[[graph.forbidden-edges]]
# csv-cli must not depend on csv-core (legacy crate)
from = "csv-cli"
to   = "csv-core"
message = "csv-cli must not depend on csv-core. Use csv-runtime instead."
