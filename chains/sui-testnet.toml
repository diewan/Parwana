chain_id = "sui-testnet"
chain_name = "sui-testnet"
default_network = "testnet"
rpc_endpoints = ["https://fullnode.testnet.sui.io:443"]
block_explorer_urls = ["https://suiscan.xyz/testnet"]
start_block = 0
contract_address = "0xeca5c0931e91d07d9ac47c7dfd767e43554150cff31de57d3da14f315de2ca55"

[finality_guarantee]
max_reorg_depth = 0
is_probabilistic = false
validator_honesty_threshold = 0.67
proof_system = { type = "BftQc", quorum_fraction = 0.67 }
max_proof_age_blocks = 100
min_anchor_sources = 1

[capabilities]
state_model = "Object"
finality_model = "BftInstant"
finality_depth = 1
deterministic_finality = true
proof_model = "CheckpointMerkle"
replay_protection = "ObjectDeleted"
native_single_use_semantics = true
reorg_risk = "Low"
max_safe_reorg_depth = 0
supports_light_client_proofs = true
supports_state_proofs = true
supports_transaction_inclusion_proofs = true
supports_offline_verification = true
supports_zk_proofs = false
chain_role = "Settlement"

[custom_settings]
# Thin-registry verifier-attested mint (RFC-0012 §9). Mints are authorized by an
# M-of-N verifier-signed attestation over the §9.2 digest — there is NO proof
# root and NO fallback mint path.
#
# Package ID where the csv_seal module is published (RFC-0012 thin-registry,
# Sui testnet, deployed 2026-07-05).
package_id = "0xeca5c0931e91d07d9ac47c7dfd767e43554150cff31de57d3da14f315de2ca55"
# Shared `Registry` object id created at publish. This 32-byte object id is the
# RFC-0012 §9.2 `destinationContract` bound into the mint-attestation digest, and
# is DISTINCT from package_id. The canonical value is recorded in
# deployments/deployment-manifest.json (deployments.sui.registry_id) — the Sui
# adapter reads it from there (get_sui_registry_id). Mirrored here for operator
# visibility. NOTE: minting stays fail-closed until the AdminCap holder seeds the
# verifier set (add_verifier + set_threshold) and the runtime holds the matching
# verifier key.
registry_id = "0x37f197aa1bf9af0898fd84a064484cbd876cf7d8078c486c7476b52b6521ac95"
