chain_id = "bitcoin-signet"
chain_name = "bitcoin-signet"
default_network = "testnet"
rpc_endpoints = ["https://mempool.space/signet/api"]
block_explorer_urls = ["https://mempool.space/signet"]
start_block = 0

[capabilities]
state_model = "Utxo"
finality_depth = 6
deterministic_finality = false
