chain_id = "bitcoin-signet"
chain_name = "bitcoin-signet"
default_network = "signet"

block_explorer_urls = ["https://mempool.space/signet", "https://blockstream.info/signet"]
start_block = 0

[rpc_policy]
chain = "bitcoin"
network = "signet"
selection = "built_in_only"

[[rpc_policy.endpoints]]
id = "bitcoin-signet-mempool-space"
url = "https://mempool.space/signet/api"
transport = "rest"
capabilities = ["read", "broadcast", "address_index", "verify"]
source = "built_in"
provider = "mempool-space"
priority = 0

[finality_guarantee]
max_reorg_depth = 6
is_probabilistic = true
validator_honesty_threshold = 0.5
proof_system = { type = "BitcoinSpv", confirmations = 6 }
max_proof_age_blocks = 100
min_anchor_sources = 1

[capabilities]
state_model = "Utxo"
finality_depth = 6
deterministic_finality = false
proof_model = "SpvMerkle"
replay_protection = "UtxoSpentCheck"
native_single_use_semantics = true
reorg_risk = "High"
max_safe_reorg_depth = 6
supports_light_client_proofs = true
supports_state_proofs = false
supports_transaction_inclusion_proofs = true
supports_offline_verification = true
supports_zk_proofs = false
chain_role = "Settlement"

[capabilities.finality_model.ProofOfWork]
confirmations = 6

[custom_settings]
