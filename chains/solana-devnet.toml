chain_id = "solana-devnet"
chain_name = "solana-devnet"
default_network = "devnet"

block_explorer_urls = ["https://explorer.solana.com/?cluster=devnet"]
start_block = 0

[rpc_policy]
chain = "solana"
network = "devnet"
selection = "built_in_only"

[[rpc_policy.endpoints]]
id = "solana-devnet-foundation"
url = "https://api.devnet.solana.com"
transport = "json_rpc_http"
capabilities = ["read", "broadcast", "verify"]
source = "built_in"
provider = "solana-foundation"
priority = 0
# Thin-registry verifier-attested mint (RFC-0012 §9). Mints are authorized by an
# M-of-N verifier-signed attestation over the §9.2 digest — there is NO proof
# root and NO fallback mint path. The csv-seal program id is the RFC-0012 §9.2
# `destinationContract`; replay protection uses never-closed tombstone PDAs
# (minted / nullifier / lock-event) since Solana has weak native single-use.
#
# program_id is read from deployments/deployment-manifest.json
# (deployments.solana.program_id) via get_solana_program_id().
# Deployed to devnet 2026-07-06 (RFC-0012 thin-registry):
# program_id = "9ekKQYpaLkTrycYmRNRDHohYZwXycHAyfLNirUDRnRVh"

[finality_guarantee]
max_reorg_depth = 32
is_probabilistic = true
validator_honesty_threshold = 0.33
proof_system = { type = "BftQc", quorum_fraction = 0.33 }
max_proof_age_blocks = 100
min_anchor_sources = 1

[capabilities]
state_model = "Account"
finality_depth = 32
deterministic_finality = false
proof_model = "SlotConfirmation"
replay_protection = "PdaClosed"
native_single_use_semantics = true
reorg_risk = "Low"
max_safe_reorg_depth = 32
supports_light_client_proofs = false
supports_state_proofs = false
supports_transaction_inclusion_proofs = true
supports_offline_verification = false
supports_zk_proofs = false
chain_role = "Settlement"

[capabilities.finality_model.OptimisticWithSlotExpiry]
slots = 32
