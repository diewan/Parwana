# Ethereum Sepolia testnet — contract addresses updated by csv-contracts/ethereum/scripts/deploy.sh
chain_id = "ethereum-sepolia"
chain_name = "Ethereum Sepolia"
default_network = "testnet"
rpc_endpoints = ["https://rpc.sepolia.org"]
block_explorer_urls = ["https://sepolia.etherscan.io"]
start_block = 0

[finality_guarantee]
max_reorg_depth = 12
is_probabilistic = false
validator_honesty_threshold = 0.67
proof_system = { type = "EthereumPos", finality_epochs = 2 }
max_proof_age_blocks = 100
min_anchor_sources = 1

[capabilities]
state_model = "Account"
finality_model = "FinalizedCheckpoint"
finality_depth = 2
deterministic_finality = true
proof_model = "MerklePatricia"
replay_protection = "SmartContractNullifier"
native_single_use_semantics = false
reorg_risk = "Medium"
max_safe_reorg_depth = 12
supports_light_client_proofs = true
supports_state_proofs = true
supports_transaction_inclusion_proofs = true
supports_offline_verification = true
supports_zk_proofs = true
chain_role = "Settlement"

[custom_settings]
chain_id_numeric = 11155111
contract_address = ""
