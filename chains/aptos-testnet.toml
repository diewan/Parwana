chain_id = "aptos-testnet"
chain_name = "aptos-testnet"
default_network = "testnet"
rpc_endpoints = ["https://fullnode.testnet.aptoslabs.com/v1"]
block_explorer_urls = ["https://explorer.aptoslabs.com/?network=testnet"]
start_block = 0
contract_address = "0xd2ca32aa271cda19180c2a7739948a9299c4b8e58c475063d6bd9f48fe33c987"

[finality_guarantee]
max_reorg_depth = 0
is_probabilistic = false
validator_honesty_threshold = 0.67
proof_system = { type = "BftQc", quorum_fraction = 0.67 }
max_proof_age_blocks = 100
min_anchor_sources = 1

[capabilities]
state_model = "Resource"
finality_model = "BftInstant"
finality_depth = 0
deterministic_finality = true
proof_model = "AccumulatorPath"
replay_protection = "ResourceDeleted"
native_single_use_semantics = true
reorg_risk = "Low"
max_safe_reorg_depth = 0
supports_light_client_proofs = true
supports_state_proofs = true
supports_transaction_inclusion_proofs = true
supports_offline_verification = true
supports_zk_proofs = false
chain_role = "Settlement"

[custom_settings]
# Thin-registry verifier-attested mint (RFC-0012 §9). Mints are authorized by an
# M-of-N verifier-signed attestation over the §9.2 digest — there is NO proof
# root and NO fallback mint path.
#
# Module address where the csv_seal module is published. This @csv_seal address
# is the RFC-0012 §9.2 `destinationContract` bound into the mint-attestation
# digest. The canonical value is recorded in
# deployments/deployment-manifest.json (deployments.aptos.module_address).
module_address = "0xd2ca32aa271cda19180c2a7739948a9299c4b8e58c475063d6bd9f48fe33c987"
