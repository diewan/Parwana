# Cross-application RFC-0013 policy fixture.
#
# SDK, Hemion, and csv-explorer tests must deserialize this exact document into
# their shared `ChainRpcPolicy` representation. It deliberately contains no
# credential material.
chain = "ethereum"
network = "sepolia"
selection = "built_in_only"

[[endpoints]]
id = "ethereum-sepolia-publicnode"
url = "https://ethereum-sepolia-rpc.publicnode.com"
transport = "json_rpc_http"
capabilities = ["read", "broadcast", "verify"]
source = "built_in"
provider = "publicnode"
priority = 0
