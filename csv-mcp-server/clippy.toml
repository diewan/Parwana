# Clippy configuration for CSV protocol architectural enforcement
# These lints enforce architectural boundaries and prevent common mistakes

# Deny common anti-patterns
unwrap-used = "deny"
expect-used = "deny"
todo = "deny"
unimplemented = "deny"
panic = "deny"
indexing-slicing = "warn"
panic-in-result-fn = "deny"

# Enforce proper error handling
missing-errors-doc = "warn"
missing-panics-doc = "warn"
missing-safety-doc = "deny"

# Enforce single-authority runtime coordination
# Adapters should not make policy decisions
# This is enforced via CI checks, but clippy helps catch some patterns

# Enforce replay protection
# Use consume_if_unconsumed instead of check_then_consume pattern

# Enforce lease ownership verification
# All mutating operations must verify lease ownership

# Performance lints
large-stack-frames = "warn"
verbose-file-reads = "warn"

# Complexity lints
cognitive-complexity = "warn"
too-many-arguments = "warn"
type-complexity = "warn"

# Style lints
doc-markdown = "warn"
missing-docs-in-private-items = "warn"
unneeded-field-pattern = "warn"

# Restriction lints
print_stdout = "warn"
print_stderr = "warn"
use_debug = "warn"
