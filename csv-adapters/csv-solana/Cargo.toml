[package]
name = "csv-solana"
version = "0.1.0"
edition = "2024"
description = "Solana adapter for CSV (Client-Side Validation) with account seals and program-based commitments"
license = "MIT OR Apache-2.0"
authors = ["Amin Razavi"]
repository = "https://github.com/Diewan/csv-protocol"
homepage = "https://github.com/Diewan/csv-protocol"
documentation = "https://docs.rs/csv-solana"
readme = "README.md"
keywords = ["solana", "blockchain", "cryptography", "csv-validation", "account"]
categories = ["cryptography::cryptocurrencies"]
publish = true
rust-version = "1.93"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
csv-protocol = { path = "../../csv-protocol" }
csv-hash = { path = "../../csv-hash" }
csv-verifier = { path = "../../csv-verifier" }
csv-proof = { path = "../../csv-proof" }
csv-codec = { path = "../../csv-codec" }
csv-store = { path = "../../csv-store", optional = true }
solana-sdk = "3.0"
solana-program = "3.0"
solana-rpc-client = { version = "3.1", optional = true }
solana-loader-v3-interface = { version = "3.0", features = ["bincode"] }
solana-system-interface = { version = "3.1", features = ["bincode"] }
solana-commitment-config = "3.1"
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
hex = "0.4.3"
sha2 = "0.10"
sha3 = "0.10"
bs58 = "0.5"
ed25519-dalek = "2.0"
rand = "0.8"
tokio = { version = "1.0", features = ["full"] }
log = "0.4"
tracing = "0.1"
reqwest = { version = "0.12", features = ["json"] }
bincode = "1.3"
base64 = "0.22"
futures-util = "0.3"

[features]
default = ["rpc"]
rpc = ["dep:solana-rpc-client", "dep:csv-store"]
mainnet = []
devnet = []
testnet = []

[dev-dependencies]
tokio-test = "0.4"
serde_json = "1.0"
