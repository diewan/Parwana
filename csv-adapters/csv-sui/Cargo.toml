[package]
name = "csv-sui"
version = "0.1.5"
edition = "2024"
description = "Sui adapter for CSV (Client-Side Validation) with object-based seals"
license = "MIT OR Apache-2.0"
authors = ["Amin Razavi"]
repository = "https://github.com/Diewan/csv-protocol"
homepage = "https://github.com/Diewan/csv-protocol"
documentation = "https://docs.rs/csv-sui"
readme = "README.md"
keywords = ["sui", "blockchain", "cryptography", "csv-validation", "objects"]
categories = ["cryptography::cryptocurrencies"]
publish = true
rust-version = "1.95"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
csv-adapter-core = { path = "../csv-adapter-core" }
csv-protocol = { path = "../../csv-protocol" }
csv-hash = { path = "../../csv-hash" }
csv-verifier = { path = "../../csv-verifier" }
csv-proof = { path = "../../csv-proof" }
csv-wire = { path = "../../csv-wire" }
csv-codec = { path = "../../csv-codec" }
csv-keys = { path = "../../csv-keys" }
csv-wallet = { path = "../../csv-wallet" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
hex = "0.4.3"
sha2 = "0.10"
log = "0.4"
chrono = { version = "0.4", features = ["serde"] }
ed25519-dalek = { version = "2.0", features = ["rand_core"] }
secp256k1 = { version = "0.28", features = ["global-context", "rand-std", "recovery"] }
serde_bytes = "0.11"
bcs = "0.1.6"
bytes = "1.5"
blake2 = "0.10"
prost-types = "0.14"
base64 = "0.22"
bs58 = "0.5"
secrecy = "0.8"
reqwest = { version = "0.12", features = ["json"], optional = true }

# Sui Rust SDK for gRPC-based RPC client
# Updated to use latest API structure
sui-rpc = { git = "https://github.com/MystenLabs/sui-rust-sdk", package = "sui-rpc", optional = true }
sui-sdk-types = { git = "https://github.com/MystenLabs/sui-rust-sdk", package = "sui-sdk-types", optional = true }
sui-transaction-builder = { git = "https://github.com/MystenLabs/sui-rust-sdk", package = "sui-transaction-builder", optional = true }
tokio = { version = "1", features = ["rt", "sync", "time", "macros"] }

async-trait.workspace = true
rand = "0.8"
futures = "0.3"

[features]
default = ["rpc"]
# Enables real RPC client (gRPC via sui-rust-sdk)
rpc = ["sui-rpc", "sui-sdk-types", "sui-transaction-builder", "reqwest"]

# Test configuration - enables rpc for tests
test = ["rpc"]

[dev-dependencies]
rand = "0.8"
tempfile = "3"
