[package]
name = "csv-seal"
version = "0.2.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "csv_seal"

[features]
default = ["idl-build"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint", "idl-build"]
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = "=1.0.2"
solana-program = "1.18"

[dev-dependencies]
libsecp256k1 = "0.6"
sha2 = "0.10"

[workspace]
