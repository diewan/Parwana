name: Rust Release and Architecture Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  constitution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check dependency graph constitution
        run: cargo test -p csv-architecture --test dep_graph_constitution

      - name: Protected L0-L4 public API snapshot
        run: |
          cargo install cargo-public-api --locked
          scripts/check-core-api.sh
      - name: Protected L0-L4 changelog gate
        run: scripts/check-core-changelog.sh "origin/${{ github.base_ref || 'main' }}"

      - name: No tokio::runtime::Builder in adapters
        run: |
          count=$(grep -rn "tokio::runtime::Builder" csv-adapters/ 2>/dev/null | wc -l)
          if [ "$count" -ne 0 ]; then
            echo "FAIL: $count runtime construction sites in adapters"
            grep -rn "tokio::runtime::Builder" csv-adapters/
            exit 1
          fi

      - name: No block_on outside binaries and tests
        run: |
          violations=$(grep -rn "\.block_on(" csv-*/src/ \
            --exclude-dir=csv-cli --exclude-dir=csv-sdk 2>/dev/null | grep -v "#\[cfg(test)\]" || true)
          if [ -n "$violations" ]; then
            echo "FAIL: block_on found outside of binaries and tests"
            echo "$violations"
            exit 1
          fi

      - name: Adapter implementations must use neutral chain ports
        run: |
          for adapter in csv-adapters/csv-*; do
            if [ "$adapter" = "csv-adapters/csv-adapter-core" ]; then
              continue
            fi
            if [ -f "$adapter/Cargo.toml" ]; then
              if ! grep -q "csv-chain-ports" "$adapter/Cargo.toml"; then
                echo "FAIL: $adapter does not depend on csv-chain-ports"
                exit 1
              fi
            fi
          done

      - name: Removed deployment template stays removed
        run: test ! -d deployment

      - name: Run architecture guard tests
        # This is the single source of truth for forbidden-pattern enforcement:
        # todo!/unimplemented!/panic!/unwrap()/expect(), zero hashes, placeholder
        # Ok(true)/Ok(()) validation stubs, empty proof vectors, production mock
        # fallback, direct adapter imports from CLI/runtime, mint paths outside
        # TransferCoordinator, and serde_json in canonical hashing paths. It
        # replaced the previous ad hoc grep steps here: those matched substrings
        # anywhere in a file (including inside legitimate test fixtures and
        # doc comments) and produced dozens of false positives that nobody could
        # act on, most notably the naive `Ok(true)|Ok(())` grep, which flags any
        # function returning unit `Ok`. The Rust tests below scan structurally
        # (function-body / brace-tracked) instead of via blind substring match,
        # so failures here are real, narrow, and reviewable in a normal PR diff.
        run: cargo test -p csv-architecture --test architecture_guard

      - name: Run CLI architecture compliance tests
        run: cargo test -p csv-cli --test architecture_compliance

      - name: Check release metadata and package contents
        run: scripts/check-release.sh

      # The SDK path (runtime, coordinator, storage) must stay wasm-compilable:
      # persistence and chain adapters are target-gated to native, wasm builds
      # run on in-memory stores. These gates keep native-only deps from leaking
      # back into the wasm dependency graph.
      - name: WASM compilation gates (csv-runtime, csv-sdk)
        run: |
          rustup target add wasm32-unknown-unknown
          cargo build -p csv-runtime --target wasm32-unknown-unknown
          cargo build -p csv-sdk --no-default-features --features std,wasm,wallet --target wasm32-unknown-unknown
          cargo build -p csv-sdk --no-default-features --features std,wasm,wallet,runtime-coordinator --target wasm32-unknown-unknown

  rust-release-matrix:
    name: Rust release matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Locked all-feature build
        run: CXXFLAGS="-include cstdint" cargo build --workspace --all-features --locked
      - name: Locked all-feature tests
        run: CXXFLAGS="-include cstdint" cargo test --workspace --all-features --locked
      - name: Documentation tests
        run: CXXFLAGS="-include cstdint" cargo test --workspace --doc --locked
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy with warnings denied
        run: CXXFLAGS="-include cstdint" cargo clippy --workspace --all-features --locked -- -D warnings
      - name: Supported WASM combinations
        run: |
          cargo build -p csv-runtime --no-default-features --target wasm32-unknown-unknown --locked
          cargo build -p csv-sdk --no-default-features --features std,wasm,wallet --target wasm32-unknown-unknown --locked
          cargo build -p csv-sdk --no-default-features --features std,wasm,wallet,runtime-coordinator --target wasm32-unknown-unknown --locked
      - name: Release package and dependency policy
        run: |
          scripts/check-release.sh
          cargo metadata --locked --format-version 1 >/tmp/cargo-metadata.json
          cargo tree --workspace --locked --duplicates

  layer-groups:
    name: Layer group (${{ matrix.group }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [core, runtime, adapters, tools]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test independent layer group
        run: scripts/test-layer-groups.sh ${{ matrix.group }}
      - name: Shared conformance corpus
        run: cargo test -p csv-testkit --test conformance_corpus -p csv-protocol --test golden_vectors

  ignored-rpc-integration-policy:
    name: Ignored RPC integration policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Document why live RPC tests are separate
        run: |
          test -f csv-docs/runbooks/OPERATOR_ROLLOUT_MULTICHAIN.md
          echo "Ignored RPC integration tests require operator-owned credentials and run only in the retained testnet evidence workflow."

  formal-verification:
    name: Formal model check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download formal verification tools
        run: |
          curl --fail --location --silent --show-error \
            --output /tmp/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar
          curl --fail --location --silent --show-error \
            --output /tmp/alloy.jar \
            https://github.com/AlloyTools/org.alloytools.alloy/releases/download/v6.2.0/org.alloytools.alloy.dist.jar

      - name: Check TLA+ models
        run: |
          java -cp /tmp/tla2tools.jar tlc2.TLC -deadlock -config formal/ReplaySafety.cfg formal/ReplaySafety.tla
          java -cp /tmp/tla2tools.jar tlc2.TLC -config formal/Ownership.cfg formal/Ownership.tla

      - name: Execute Alloy analyses
        run: java -jar /tmp/alloy.jar exec -q -f -o /tmp/csv-alloy-replay -c '*' formal/alloy/ReplaySafety.als
