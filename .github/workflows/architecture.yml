name: Architectural Constitution

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  constitution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Check dependency graph constitution
        run: cargo deny check graph

      - name: Run dependency DAG test
        run: CXXFLAGS="-include cstdint" cargo test -p csv-architecture --test dep_graph_constitution

      - name: No tokio::runtime::Builder in adapters
        run: |
          count=$(grep -rn "tokio::runtime::Builder" csv-adapters/ 2>/dev/null | wc -l)
          if [ "$count" -ne 0 ]; then
            echo "FAIL: $count runtime construction sites in adapters"
            grep -rn "tokio::runtime::Builder" csv-adapters/
            exit 1
          fi

      - name: No block_on outside binaries and tests
        run: |
          violations=$(grep -rn "\.block_on(" csv-*/src/ \
            --exclude-dir=csv-cli --exclude-dir=csv-sdk 2>/dev/null | grep -v "#\[cfg(test)\]" || true)
          if [ -n "$violations" ]; then
            echo "FAIL: block_on found outside of binaries and tests"
            echo "$violations"
            exit 1
          fi

      - name: Adapter configs must use csv-adapter-core
        run: |
          for adapter in csv-adapters/csv-*; do
            if [ "$adapter" = "csv-adapters/csv-adapter-core" ]; then
              continue
            fi
            if [ -f "$adapter/Cargo.toml" ]; then
              if ! grep -q "csv-adapter-core" "$adapter/Cargo.toml"; then
                echo "FAIL: $adapter does not depend on csv-adapter-core"
                exit 1
              fi
            fi
          done

      - name: Removed deployment template stays removed
        run: test ! -d deployment

      - name: Run existing architecture guard tests
        run: CXXFLAGS="-include cstdint" cargo test -p csv-architecture --test architecture_guard

      - name: Run CLI architecture compliance tests
        run: CXXFLAGS="-include cstdint" cargo test -p csv-cli --test architecture_compliance

      - name: No todo! or unimplemented! in production code
        run: |
          violations=$(grep -rn "todo!\|unimplemented!" csv-*/src/ \
            --exclude-dir=csv-cli --exclude-dir=csv-sdk --exclude-dir=csv-examples \
            --exclude-dir=csv-testkit --exclude-dir=csv-mcp-server 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "FAIL: todo! or unimplemented! found in production code"
            echo "$violations"
            exit 1
          fi

      - name: No panic! or unreachable! in production code
        run: |
          violations=$(grep -rn "panic!\|unreachable!" csv-*/src/ \
            --exclude-dir=csv-cli --exclude-dir=csv-sdk --exclude-dir=csv-examples \
            --exclude-dir=csv-testkit --exclude-dir=csv-mcp-server 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "FAIL: panic! or unreachable! found in production code"
            echo "$violations"
            exit 1
          fi

      - name: No unwrap() or expect() in critical paths
        run: |
          violations=$(grep -rn "\.unwrap()\|\.expect(" csv-runtime/src/ csv-protocol/src/ csv-verifier/src/ csv-hash/src/ csv-proof/src/ csv-codec/src/ 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "FAIL: .unwrap() or .expect() found in critical paths"
            echo "$violations"
            exit 1
          fi

      - name: No zero hash patterns in production code
        run: |
          violations=$(grep -rn "Hash::new(\[0u8; 32\])\|\[0u8; 32\]\|\[0; 32\]" csv-runtime/src/ csv-sdk/src/ csv-cli/src/ csv-protocol/src/ csv-verifier/src/ csv-hash/src/ csv-proof/src/ 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "FAIL: zero hash patterns found in production code"
            echo "$violations"
            exit 1
          fi

      - name: No placeholder Ok(true) or Ok(()) in validation code
        run: |
          violations=$(grep -rn "Ok(true)\|Ok(())" csv-verifier/src/ csv-protocol/src/ csv-runtime/src/ 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "FAIL: placeholder Ok(true) or Ok(()) found in validation code"
            echo "$violations"
            exit 1
          fi

      - name: No direct chain adapter imports in CLI
        run: |
          violations=$(grep -rn "use csv_adapters::csv_bitcoin\|use csv_adapters::csv_ethereum\|use csv_adapters::csv_solana\|use csv_adapters::csv_sui\|use csv_adapters::csv_aptos\|use csv_adapters::csv_celestia" csv-cli/src/ 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "FAIL: direct chain adapter imports found in CLI"
            echo "$violations"
            exit 1
          fi

      - name: No direct chain adapter imports in runtime
        run: |
          violations=$(grep -rn "use csv_adapters::csv_bitcoin\|use csv_adapters::csv_ethereum\|use csv_adapters::csv_solana\|use csv_adapters::csv_sui\|use csv_adapters::csv_aptos\|use csv_adapters::csv_celestia" csv-runtime/src/ 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "FAIL: direct chain adapter imports found in runtime"
            echo "$violations"
            exit 1
          fi

  formal-verification:
    name: Formal model check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download formal verification tools
        run: |
          curl --fail --location --silent --show-error \
            --output /tmp/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar
          curl --fail --location --silent --show-error \
            --output /tmp/alloy.jar \
            https://github.com/AlloyTools/org.alloytools.alloy/releases/download/v6.2.0/org.alloytools.alloy.dist.jar

      - name: Check TLA+ models
        run: |
          java -cp /tmp/tla2tools.jar tlc2.TLC -deadlock -config formal/ReplaySafety.cfg formal/ReplaySafety.tla
          java -cp /tmp/tla2tools.jar tlc2.TLC -config formal/Ownership.cfg formal/Ownership.tla

      - name: Execute Alloy analyses
        run: java -jar /tmp/alloy.jar exec -q -f -o /tmp/csv-alloy-replay -c '*' formal/alloy/ReplaySafety.als
